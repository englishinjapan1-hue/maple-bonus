<style>

  .card{background:#fff;border:1px solid var(--line);border-radius:18px;margin-bottom:20px;box-shadow:var(--shadow);overflow:hidden}

  .day-badge{background:var(--navy);color:var(--paper);padding:18px 20px;display:flex;flex-direction:column;align-items:center;justify-content:center;min-width:96px;flex-shrink:0}

  .kind .k-pos{font-size:10px;color:var(--navy-soft);opacity:.75}

  .reply-box{margin-top:16px;padding:13px 16px;background:var(--paper);border:1px solid var(--line);border-radius:10px}

  .vars{margin-top:14px}
  .vars-label{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--navy-soft);opacity:.7;font-weight:700;margin-bottom:7px}
  .var{font-family:Georgia,serif;font-size:16px;margin-bottom:5px;color:var(--navy-soft)}
  .var:last-child{margin-bottom:0}
  .var .fill{color:var(--gold);font-style:italic}
  .var .jp{font-family:"Hiragino Kaku Gothic ProN",sans-serif;font-size:12px}

  /* Your turn（ママが今日埋める） */
  .your-turn{margin-top:16px;padding:13px 16px;background:var(--paper);border:1px dashed var(--line);border-radius:10px}
  .your-turn .yt-label{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:7px;display:block}
  .your-turn .yt-row{display:flex;align-items:baseline;gap:6px;flex-wrap:wrap;font-family:Georgia,serif;font-size:18px}
  .your-turn input{font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;font-size:15px;border:none;border-bottom:2px solid var(--gold-soft);background:transparent;padding:2px 6px;min-width:130px;flex:1;color:var(--navy);outline:none}

  .your-turn .yt-hint{font-size:11.5px;color:var(--navy-soft);margin-top:7px;font-family:"Hiragino Kaku Gothic ProN",sans-serif}
  .your-turn .yt-hint .w{color:var(--gold);font-style:italic;font-family:Georgia,serif}

  footer{border-top:1px solid var(--line);padding:26px 0 0;text-align:center;margin-top:26px}
  footer .brand{font-size:13px;font-weight:700}

  .preview-tag{text-align:center;font-size:12px;color:var(--navy-soft);opacity:.8;margin-bottom:20px}

  @media(max-width:520px){
    .card-top{flex-direction:column}

    .day-badge .d-num{font-size:26px}
    .day-badge .stage{margin-top:0}
    .main-line .en{font-size:22px}

</style>

    // 自問自答型カード
    const aEn=`${d.a[0]}<span class="fill">${d.a[1]}</span>${d.a[2]}`;
    const varsHtml = d.vars.map(v=>`<div class="var">${d.a[0]}<span class="fill">${v[0]}</span><span class="jp">${v[1]}</span></div>`).join('');
    card.innerHTML=`
      <div class="card-top">
        <div class="day-badge">
          <span class="d-label">Day</span>
          <span class="d-num">${d.day}</span>
          <span class="stage">ママが実演</span>
        </div>
        <div class="head-right">
          <span class="scene">${d.scene}<span class="en">${d.sceneEn}</span></span>
          <span class="type-tag" style="color:var(--child);opacity:1">自問自答タイプ ── Q&amp;A</span>
        </div>
      </div>
      <div class="card-body">
        <div class="reply-box" style="background:var(--child-soft);border-color:var(--child)">
          <div class="rb-label" style="color:var(--child)">🎙 ママが一人二役で実演</div>
          <div class="rb-line"><span style="color:var(--navy);font-weight:600">${d.q[0]}</span></div>
          <div class="rb-jp">${d.q[1]}</div>
          <div class="rb-line" style="margin-top:8px"><span class="a">${aEn}</span></div>
          <div class="rb-jp">${d.a[3]}</div>
        </div>
        <span class="kind"><span class="k-main">${d.kindMain}</span><span class="k-pos">（${d.kindPos}）</span></span>
        <div class="vars">
          <div class="vars-label">言いかえ例（答えを差し替え）</div>
          ${varsHtml}
        </div>
        <div class="your-turn">
          <span class="yt-label">Make your own ── 自分で足してみよう</span>
          <div class="yt-row"><span>${d.yt[0]}</span><input type="text" placeholder="..."><span>${d.yt[1]}</span></div>
          <div class="yt-hint">💡 例：<span class="w">${d.ytWords}</span></div>
        </div>
      </div>`;
    cardsEl.appendChild(card);
    return;
  }

  const mainEn=`${d.main[0]}<span class="fill">${d.main[1]}</span>${d.main[2]}`;
  const replyHtml = d.reply ? `
    <div class="reply-box">
      <div class="rb-label">受け答え（一人二役）</div>
      <div class="rb-line"><span>${d.reply[0].split(' ── ')[0]}</span><span class="sep">──</span><span class="a">${d.reply[0].split(' ── ')[1]}</span></div>
      <div class="rb-jp">${d.reply[1]}</div>
    </div>` : '';
  const varsHtml = d.vars.map(v=>`<div class="var">${d.main[0]}<span class="fill">${v[0]}</span>${(d.main[2].startsWith('!')||d.main[2].startsWith('.'))?'':''}<span class="jp">${v[1]}</span></div>`).join('');
  card.innerHTML=`
    <div class="card-top">
      <div class="day-badge">
        <span class="d-label">Day</span>
        <span class="d-num">${d.day}</span>
        <span class="stage">ママが実演</span>
      </div>
      <div class="head-right">
        <span class="scene">${d.scene}<span class="en">${d.sceneEn}</span></span>
        <span class="type-tag">ひとりごとタイプ ── Self-talk</span>
      </div>
    </div>
    <div class="card-body">
      <div class="main-line">
        <div class="en">${mainEn}</div>
        <div class="jp">${d.main[3]}</div>
      </div>
      <span class="kind"><span class="k-main">${d.kindMain}</span><span class="k-pos">（${d.kindPos}）</span></span>
      ${replyHtml}
      <div class="vars">
        <div class="vars-label">言いかえ例</div>
        ${varsHtml}
      </div>
      <div class="your-turn">
        <span class="yt-label">Make your own ── 自分で足してみよう</span>
        <div class="yt-row"><span>${d.yt[0]}</span><input type="text" placeholder="..."><span>${d.yt[1]}</span></div>
        <div class="yt-hint">💡 例：<span class="w">${d.ytWords}</span></div>
      </div>
    </div>`;
  cardsEl.appendChild(card);
});
</script>
</body>
</html>
